  <body>
    <div id="root"></div>
    <script>
      // Version-based SW cleanup: only remove stale SWs from older versions,
      // but keep the current SW alive for offline capability.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var currentScope = new URL('./', location.href).pathname;
          regs.forEach(function (reg) {
            if (reg.scope && reg.scope.indexOf(currentScope) === 0 && reg.active) {
              // Keep active SW for current scope — vite-plugin-pwa handles updates
            } else if (reg.scope && reg.scope.indexOf(currentScope) !== 0) {
              // Remove SWs from other scopes (stale builds)
              reg.unregister();
            }
          });
        }).catch(function () {});
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
